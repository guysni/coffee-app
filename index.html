<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snit-Coffee Orders</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase Configuration
    const SUPABASE_URL = "https://twbsccqhutueemehycch.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_peoxwmGX0-BXsUQCQMUAOA_9DQb9STH";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>
</head>
<body class="bg-stone-100 text-stone-800 font-sans min-h-screen pb-12 transition-all duration-200">

  <!-- Header -->
  <header class="bg-amber-950 text-amber-50 shadow-md py-6 px-4 mb-8 border-b-4 border-amber-800">
    <div class="max-w-6xl mx-auto">
      <!-- Language Toggle Button -->
      <div class="flex justify-end mb-4">
        <button onclick="toggleLanguage()" class="bg-amber-900 hover:bg-amber-800 text-amber-100 font-semibold py-1.5 px-4 rounded-full text-xs transition-colors cursor-pointer border border-amber-700 shadow-xs shrink-0">
          🌐 <span id="langBtnText">עברית</span>
        </button>
      </div>

      <!-- Styled Logo Block -->
      <div class="flex flex-col items-center justify-center">
      <div class="flex items-center gap-4 mb-2">
        <!-- CSS Coffee Cup Logo Graphic -->
        <div class="relative w-12 h-10 bg-amber-100 rounded-b-xl border-t-2 border-amber-100 shadow-xs flex items-center justify-center">
          <!-- Handle -->
          <div class="absolute right-[-8px] top-[6px] w-4 h-5 border-3 border-amber-100 rounded-r-lg"></div>
          <!-- Steam lines -->
          <div class="absolute top-[-14px] left-[12px] w-1 h-3 bg-amber-200/60 rounded-full animate-bounce"></div>
          <div class="absolute top-[-18px] left-[20px] w-1 h-4 bg-amber-200/80 rounded-full animate-bounce delay-150"></div>
          <div class="absolute top-[-12px] left-[28px] w-1 h-3 bg-amber-200/60 rounded-full animate-bounce delay-300"></div>
          <!-- Inside bean indicator -->
          <div class="w-2 h-4 bg-amber-950 rounded-full transform rotate-45 opacity-80"></div>
        </div>
        
        <!-- Logo Text Typography -->
        <div class="flex flex-col">
          <span class="text-3xl font-black tracking-wide font-serif text-amber-100">Snit-Coffee</span>
          <div class="h-0.5 w-full bg-amber-600 rounded-full mt-0.5"></div>
        </div>
      </div>
      
      <p id="headerSubtitle" class="text-amber-200/90 text-sm font-medium mt-2 text-center">Place your order and I'll get brewing</p>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <!-- Left Column: Order Form -->
    <section class="bg-white p-6 rounded-2xl shadow-xs border border-stone-200 h-fit">
      <h2 id="formTitle" class="text-xl font-bold text-stone-900 mb-6 border-b border-stone-100 pb-2">Place Your Order</h2>
      
      <form id="coffeeForm" class="space-y-5">
        <div>
          <label id="lblName" class="block text-sm font-semibold mb-1">Your Name</label>
          <input type="text" id="name" required class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50">
        </div>

        <div id="coffeeOptions" class="space-y-4">
          <div>
            <label id="lblCoffeeMethod" class="block text-sm font-semibold mb-1">Coffee Method</label>
            <select id="coffeeMethod" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50" onchange="onCoffeeMethodChange()"></select>
          </div>
          <div id="coffeeStyleField" class="hidden">
            <label id="lblCoffeeStyle" class="block text-sm font-semibold mb-1">Style</label>
            <select id="coffeeStyle" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50" onchange="onCoffeeStyleChange()"></select>
          </div>
          <div id="capsuleMilkStyleField" class="hidden">
            <label id="lblCapsuleMilkStyle" class="block text-sm font-semibold mb-1">Milk Style</label>
            <select id="capsuleMilkStyle" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50"></select>
          </div>
          <div id="cappuccinoMilkModeField" class="hidden">
            <label id="lblCappuccinoMilkMode" class="block text-sm font-semibold mb-1">Milk Preparation</label>
            <select id="cappuccinoMilkMode" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50" onchange="onCappuccinoModeChange()"></select>
          </div>
          <div id="foamLevelField" class="hidden">
            <label id="lblFoamLevel" class="block text-sm font-semibold mb-1">Foam Level</label>
            <select id="foamLevel" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50"></select>
          </div>
          <div id="heatLevelField" class="hidden">
            <label id="lblHeatLevel" class="block text-sm font-semibold mb-1">Heat Level</label>
            <select id="heatLevel" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50"></select>
          </div>
        </div>

        <div id="milkField" class="hidden">
          <label id="lblMilk" class="block text-sm font-semibold mb-1">Milk Type</label>
          <select id="milkType" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50"></select>
        </div>

        <div>
          <label id="lblSugar" class="block text-sm font-semibold mb-1">Sugar Level</label>
          <select id="sugarLevel" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 bg-stone-50"></select>
        </div>

        <div>
          <label id="lblNotes" class="block text-sm font-semibold mb-1">Special Notes</label>
          <textarea id="notes" class="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800 h-20 bg-stone-50"></textarea>
        </div>

        <button type="submit" id="btnSubmit" class="w-full bg-amber-900 text-white font-bold py-3 rounded-lg hover:bg-amber-950 transition-colors cursor-pointer shadow-xs tracking-wide">
          Submit Order 🚀
        </button>
      </form>
      <div id="formFeedback" class="mt-4 text-center hidden font-medium"></div>
    </section>

    <!-- Right Column: Host Dashboard -->
    <section class="bg-white p-6 rounded-2xl shadow-xs border border-stone-200">
      <div class="flex justify-between items-center mb-6 border-b border-stone-100 pb-2">
        <h2 id="dashboardTitle" class="text-xl font-bold text-stone-900">Live Orders (Host View)</h2>
        <button onclick="fetchOrders()" id="btnRefresh" class="text-xs bg-stone-200 hover:bg-stone-300 text-stone-700 px-3 py-1 rounded-full font-medium transition-colors cursor-pointer">
          🔄 Refresh
        </button>
      </div>
      
      <div id="ordersList" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
        <p id="noOrdersMessage" class="text-stone-400 text-center py-8">No active orders yet.</p>
      </div>
    </section>

  </main>

  <script>
    const COFFEE_TREE = {
      methods: ['instant', 'capsules', 'professional'],
      instant: {},
      capsules: { styles: ['short', 'long', 'with_milk', 'iced'], withMilk: ['regular', 'cold_foam', 'hot_foam'] },
      professional: { styles: ['short', 'double', 'cappuccino', 'iced'], cappuccinoModes: ['choice', 'foamed'] },
      levelKeys: ['1', '2', '3']
    };

    const translations = {
      en: {
        dir: "ltr",
        langBtn: "עברית",
        headerSubtitle: "Place your order and I'll get brewing",
        formTitle: "Place Your Order",
        lblName: "Your Name",
        lblCoffeeMethod: "Coffee Method",
        lblCoffeeStyle: "Style",
        lblCapsuleMilkStyle: "Milk Style",
        lblCappuccinoMilkMode: "Milk Preparation",
        lblFoamLevel: "Foam",
        lblHeatLevel: "Heat",
        lblMilk: "Milk Type",
        lblSugar: "Sugar Level",
        lblNotes: "Special Notes",
        notesPlaceholder: "Extra hot, ice, strong...",
        btnSubmit: "Submit Order 🚀",
        dashboardTitle: "Live Orders (Host View)",
        btnRefresh: "🔄 Refresh",
        noOrders: "No active orders yet.",
        successMsg: "Order submitted successfully! ☕",
        errorMsg: "Error submitting order. Try again.",
        doneBtn: "Done",
        sugarOptions: ["No Sugar", "½ Teaspoon", "1 Teaspoon", "2 Teaspoons"],
        icedDetail: "ice + regular milk",
        coffeeMethods: {
          instant: "Instant Coffee (Taster's Choice)",
          capsules: "Nespresso Capsules",
          professional: "Professional Bean Grinder"
        },
        coffeeStyles: {
          short: "Short Espresso",
          long: "Long Espresso",
          with_milk: "With Milk",
          iced: "Iced Coffee",
          double: "Double Espresso",
          cappuccino: "Cappuccino"
        },
        capsuleMilkStyles: {
          regular: "Regular milk",
          cold_foam: "Cold foam",
          hot_foam: "Hot foam"
        },
        cappuccinoModes: {
          choice: "Milk of choice",
          foamed: "Foamed milk"
        },
        milkKeys: {
          none: "No milk",
          regular: "Regular 3%",
          rice: "Rice milk with almonds"
        }
      },
      he: {
        dir: "rtl",
        langBtn: "English",
        headerSubtitle: "תגידו לי מה בא לכם, ואני כבר מתחיל להכין",
        formTitle: "הזמינו את הקפה שלכם",
        lblName: "שם מלא",
        lblCoffeeMethod: "שיטת הכנה",
        lblCoffeeStyle: "סוג",
        lblCapsuleMilkStyle: "סוג חלב",
        lblCappuccinoMilkMode: "הכנת חלב",
        lblFoamLevel: "קצף",
        lblHeatLevel: "חום",
        lblMilk: "סוג חלב",
        lblSugar: "כמות סוכר",
        lblNotes: "הערות מיוחדות",
        notesPlaceholder: "רותח, קר, חזק, בלי קצף...",
        btnSubmit: "שלח הזמנה 🚀",
        dashboardTitle: "הזמנות חיות (תצוגת מארח)",
        btnRefresh: "🔄 רענן",
        noOrders: "אין הזמנות פעילות כרגע.",
        successMsg: "ההזמנה נשלחה בהצלחה! ☕",
        errorMsg: "שגיאה בשליחת ההזמנה. נסה שוב.",
        doneBtn: "מוכן",
        sugarOptions: ["ללא סוכר", "½ כפית סוכר", "1 כפית סוכר", "2 כפיות סוכר"],
        icedDetail: "קרח + חלב רגיל",
        coffeeMethods: {
          instant: "קפה נמס (Taster's Choice)",
          capsules: "קפסולות נספרסו",
          professional: "מכונה מקצועית טוחנת פולים"
        },
        coffeeStyles: {
          short: "אספרסו קצר",
          long: "אספרסו ארוך",
          with_milk: "עם חלב",
          iced: "קפה קר",
          double: "אספרסו כפול",
          cappuccino: "קפוצינו"
        },
        capsuleMilkStyles: {
          regular: "רגיל",
          cold_foam: "מוקצף קר",
          hot_foam: "מוקצף חם"
        },
        cappuccinoModes: {
          choice: "חלב לבחירה",
          foamed: "חלב מוקצף"
        },
        milkKeys: {
          none: "ללא חלב",
          regular: "רגיל 3%",
          rice: "חלב אורז עם שקדים"
        }
      }
    };

    let currentLang = 'en';

    function populateKeyDropdown(elementId, keys, labelMap) {
      const select = document.getElementById(elementId);
      const currentVal = select.value;
      select.innerHTML = keys.map(key => `<option value="${key}">${labelMap[key]}</option>`).join('');
      const idx = Array.from(select.options).findIndex(opt => opt.value === currentVal);
      select.selectedIndex = idx >= 0 ? idx : 0;
    }

    function populateDropdown(elementId, optionsArray) {
      const select = document.getElementById(elementId);
      const currentVal = select.value;
      select.innerHTML = optionsArray.map(opt => `<option value="${opt}">${opt}</option>`).join('');
      const idx = Array.from(select.options).findIndex(opt => opt.value === currentVal);
      select.selectedIndex = idx >= 0 ? idx : 0;
    }

    function renderCoffeeMethod() {
      const t = translations[currentLang];
      populateKeyDropdown('coffeeMethod', COFFEE_TREE.methods, t.coffeeMethods);
    }

    function renderCoffeeStyle() {
      const t = translations[currentLang];
      const method = document.getElementById('coffeeMethod').value;
      if (method === 'instant') return;
      const styles = COFFEE_TREE[method].styles;
      populateKeyDropdown('coffeeStyle', styles, t.coffeeStyles);
    }

    function renderCoffeeSubOptions() {
      const t = translations[currentLang];
      const levelLabels = { '1': '1', '2': '2', '3': '3' };
      populateKeyDropdown('capsuleMilkStyle', COFFEE_TREE.capsules.withMilk, t.capsuleMilkStyles);
      populateKeyDropdown('cappuccinoMilkMode', COFFEE_TREE.professional.cappuccinoModes, t.cappuccinoModes);
      populateKeyDropdown('foamLevel', COFFEE_TREE.levelKeys, levelLabels);
      populateKeyDropdown('heatLevel', COFFEE_TREE.levelKeys, levelLabels);
    }

    function refreshMilkOptions(mode) {
      const t = translations[currentLang];
      const keys = mode === 'instant' ? ['regular', 'rice']
        : mode === 'optional' ? ['none', 'regular', 'rice']
        : ['regular', 'rice'];
      populateKeyDropdown('milkType', keys, t.milkKeys);
    }

    function toggleField(id, show) {
      document.getElementById(id).classList.toggle('hidden', !show);
    }

    function updateCoffeeVisibility() {
      const method = document.getElementById('coffeeMethod').value;
      const style = document.getElementById('coffeeStyle').value;
      const cappuccinoMode = document.getElementById('cappuccinoMilkMode').value;

      toggleField('coffeeStyleField', method !== 'instant');
      toggleField('capsuleMilkStyleField', method === 'capsules' && style === 'with_milk');
      toggleField('cappuccinoMilkModeField', method === 'professional' && style === 'cappuccino');

      const showFoamHeat = method === 'professional' && style === 'cappuccino' && cappuccinoMode === 'foamed';
      toggleField('foamLevelField', showFoamHeat);
      toggleField('heatLevelField', showFoamHeat);

      let showMilk = false;
      let milkMode = null;

      if (method === 'instant') {
        showMilk = true;
        milkMode = 'instant';
      } else if (method === 'professional' && (style === 'short' || style === 'double')) {
        showMilk = true;
        milkMode = 'optional';
      } else if (method === 'professional' && style === 'cappuccino' && cappuccinoMode === 'choice') {
        showMilk = true;
        milkMode = 'choice';
      }

      toggleField('milkField', showMilk);
      if (showMilk && milkMode) refreshMilkOptions(milkMode);
    }

    function onCoffeeMethodChange() {
      renderCoffeeStyle();
      updateCoffeeVisibility();
    }

    function onCoffeeStyleChange() {
      updateCoffeeVisibility();
    }

    function onCappuccinoModeChange() {
      updateCoffeeVisibility();
    }

    function buildOrderSummary() {
      const t = translations[currentLang];
      const method = document.getElementById('coffeeMethod').value;
      const parts = [t.coffeeMethods[method]];
      let milkType = '';

      if (method === 'instant') {
        const milkKey = document.getElementById('milkType').value;
        milkType = t.milkKeys[milkKey];
      } else {
        const style = document.getElementById('coffeeStyle').value;
        parts.push(t.coffeeStyles[style]);

        if (method === 'capsules' && style === 'with_milk') {
          const capMilk = document.getElementById('capsuleMilkStyle').value;
          parts.push(t.capsuleMilkStyles[capMilk]);
        }

        if (style === 'iced') {
          parts.push(t.icedDetail);
        }

        if (method === 'professional' && style === 'cappuccino') {
          const mode = document.getElementById('cappuccinoMilkMode').value;
          parts.push(t.cappuccinoModes[mode]);
          if (mode === 'foamed') {
            parts.push(`${t.lblFoamLevel} ${document.getElementById('foamLevel').value}`);
            parts.push(`${t.lblHeatLevel} ${document.getElementById('heatLevel').value}`);
          } else {
            const milkKey = document.getElementById('milkType').value;
            milkType = t.milkKeys[milkKey];
          }
        }

        if (method === 'professional' && (style === 'short' || style === 'double')) {
          const milkKey = document.getElementById('milkType').value;
          if (milkKey !== 'none') milkType = t.milkKeys[milkKey];
        }
      }

      return {
        coffee_type: parts.join(' · '),
        milk_type: milkType
      };
    }

    function resetCoffeeFields() {
      document.getElementById('coffeeMethod').selectedIndex = 0;
      renderCoffeeStyle();
      renderCoffeeSubOptions();
      updateCoffeeVisibility();
    }

    function updateUI() {
      const t = translations[currentLang];

      document.documentElement.dir = t.dir;
      document.documentElement.lang = currentLang;

      document.getElementById('langBtnText').innerText = t.langBtn;
      document.getElementById('headerSubtitle').innerText = t.headerSubtitle;
      document.getElementById('formTitle').innerText = t.formTitle;
      document.getElementById('lblName').innerText = t.lblName;
      document.getElementById('lblCoffeeMethod').innerText = t.lblCoffeeMethod;
      document.getElementById('lblCoffeeStyle').innerText = t.lblCoffeeStyle;
      document.getElementById('lblCapsuleMilkStyle').innerText = t.lblCapsuleMilkStyle;
      document.getElementById('lblCappuccinoMilkMode').innerText = t.lblCappuccinoMilkMode;
      document.getElementById('lblFoamLevel').innerText = t.lblFoamLevel;
      document.getElementById('lblHeatLevel').innerText = t.lblHeatLevel;
      document.getElementById('lblMilk').innerText = t.lblMilk;
      document.getElementById('lblSugar').innerText = t.lblSugar;
      document.getElementById('lblNotes').innerText = t.lblNotes;
      document.getElementById('notes').placeholder = t.notesPlaceholder;
      document.getElementById('btnSubmit').innerText = t.btnSubmit;
      document.getElementById('dashboardTitle').innerText = t.dashboardTitle;
      document.getElementById('btnRefresh').innerText = t.btnRefresh;

      renderCoffeeMethod();
      renderCoffeeStyle();
      renderCoffeeSubOptions();
      populateDropdown('sugarLevel', t.sugarOptions);
      updateCoffeeVisibility();

      fetchOrders();
    }

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'he' : 'en';
      updateUI();
    }

    const form = document.getElementById('coffeeForm');
    const feedback = document.getElementById('formFeedback');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const t = translations[currentLang];
      const summary = buildOrderSummary();

      const payload = {
        name: document.getElementById('name').value,
        coffee_type: summary.coffee_type,
        milk_type: summary.milk_type,
        sugar_level: document.getElementById('sugarLevel').value,
        notes: document.getElementById('notes').value
      };

      try {
        const { error } = await supabaseClient.from('coffee_orders').insert([payload]);
        if (error) throw error;

        feedback.className = "mt-4 text-center text-green-600 font-medium";
        feedback.innerText = t.successMsg;
        form.reset();
        resetCoffeeFields();
        fetchOrders();
      } catch (err) {
        feedback.className = "mt-4 text-center text-red-600 font-medium";
        feedback.innerText = t.errorMsg;
        console.error(err);
      }

      feedback.classList.remove('hidden');
      setTimeout(() => feedback.classList.add('hidden'), 5000);
    });

    async function fetchOrders() {
      const t = translations[currentLang];
      try {
        const { data, error } = await supabaseClient
          .from('coffee_orders')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        const container = document.getElementById('ordersList');
        if (!data || data.length === 0) {
          container.innerHTML = `<p id="noOrdersMessage" class="text-stone-400 text-center py-8">${t.noOrders}</p>`;
          return;
        }

        container.innerHTML = data.map(order => {
          const details = order.milk_type
            ? `🥛 ${escapeHtml(order.milk_type)} | 🍬 ${escapeHtml(order.sugar_level)}`
            : `🍬 ${escapeHtml(order.sugar_level)}`;
          return `
          <div class="p-4 border border-stone-100 rounded-xl bg-stone-50 flex justify-between items-start gap-4 shadow-2xs">
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-bold text-stone-900">${escapeHtml(order.name)}</span>
                <span class="text-xs bg-amber-100 text-amber-900 px-2 py-0.5 rounded-full font-semibold">${escapeHtml(order.coffee_type)}</span>
              </div>
              <p class="text-sm text-stone-600 mt-1">${details}</p>
              ${order.notes ? `<p class="text-xs italic text-stone-500 mt-1 bg-stone-100 p-1.5 rounded">📝 ${escapeHtml(order.notes)}</p>` : ''}
              <span class="text-[10px] text-stone-400 block mt-2">${new Date(order.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
            <button onclick="deleteOrder(${order.id})" class="text-xs text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 p-1.5 rounded-lg transition-colors cursor-pointer font-medium">
              ${t.doneBtn}
            </button>
          </div>`;
        }).join('');

      } catch (err) {
        console.error("Error fetching orders:", err);
      }
    }

    async function deleteOrder(id) {
      try {
        const { error } = await supabaseClient.from('coffee_orders').delete().eq('id', id);
        if (error) throw error;
        fetchOrders();
      } catch (err) {
        console.error("Error clearing order:", err);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    updateUI();
    setInterval(fetchOrders, 10000);
  </script>
</body>
</html>
